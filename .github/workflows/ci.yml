name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.12"
            extras: linux
            experimental: false
          - os: macos-latest
            python: "3.12"
            extras: macos
            experimental: false
          - os: windows-latest
            python: "3.12"
            extras: windows
            experimental: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}

    steps:
      - uses: actions/checkout@v4

      # setup-python's macOS/Windows builds disable sqlite3.enable_load_extension,
      # which breaks sqlite_vec. Use brew python on macOS so extensions work.
      - name: Set up Python (non-macOS)
        if: runner.os != 'macOS'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Set up Python via brew (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install "python@${{ matrix.python }}"
          BREW_PREFIX=$(brew --prefix "python@${{ matrix.python }}")
          echo "$BREW_PREFIX/libexec/bin" >> "$GITHUB_PATH"
          echo "$BREW_PREFIX/bin" >> "$GITHUB_PATH"
          "$BREW_PREFIX/bin/python${{ matrix.python }}" -c "import sqlite3; conn=sqlite3.connect(':memory:'); conn.enable_load_extension(True); print('sqlite extensions OK')"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[${{ matrix.extras }},dev]"

      - name: Run pytest
        run: pytest tests/ -q
